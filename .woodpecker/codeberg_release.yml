when:
  event: tag
  ref:
    include: [ v* ]

steps:
  build-all:
    image: rust:latest
    commands:
      # Install cross toolchain
      - apt-get update && apt-get install -y musl-tools gcc-aarch64-linux-gnu
      - cargo install cross
      # Add targets
      - rustup target add x86_64-unknown-linux-musl
      - rustup target add aarch64-unknown-linux-gnu
      - rustup target add aarch64-unknown-linux-musl
      # Build x86_64-gnu (native)
      - cargo build --release
      - cargo build --features runner --release
      - mkdir -p dist
      - cp target/release/lume dist/lume-x86_64-linux-gnu
      - cp target/release/lume-se dist/lume-se-x86_64-linux-gnu
      # Build x86_64-musl
      - cross build --release --target x86_64-unknown-linux-musl
      - cross build --features runner --release --target x86_64-unknown-linux-musl
      - cp target/x86_64-unknown-linux-musl/release/lume dist/lume-x86_64-linux-musl
      - cp target/x86_64-unknown-linux-musl/release/lume-se dist/lume-se-x86_64-linux-musl
      # Build aarch64-gnu
      - cross build --release --target aarch64-unknown-linux-gnu
      - cross build --features runner --release --target aarch64-unknown-linux-gnu
      - cp target/aarch64-unknown-linux-gnu/release/lume dist/lume-aarch64-linux-gnu
      - cp target/aarch64-unknown-linux-gnu/release/lume-se dist/lume-se-aarch64-linux-gnu
      # Build aarch64-musl
      - cross build --release --target aarch64-unknown-linux-musl
      - cross build --features runner --release --target aarch64-unknown-linux-musl
      - cp target/aarch64-unknown-linux-musl/release/lume dist/lume-aarch64-linux-musl
      - cp target/aarch64-unknown-linux-musl/release/lume-se dist/lume-se-aarch64-linux-musl
      # Package
      - VERSION=${CI_COMMIT_TAG#v}
      - tar czf dist/lume-v${VERSION}-x86_64-linux-gnu.tar.gz -C dist lume-x86_64-linux-gnu lume-se-x86_64-linux-gnu
      - tar czf dist/lume-v${VERSION}-x86_64-linux-musl.tar.gz -C dist lume-x86_64-linux-musl lume-se-x86_64-linux-musl
      - tar czf dist/lume-v${VERSION}-aarch64-linux-gnu.tar.gz -C dist lume-aarch64-linux-gnu lume-se-aarch64-linux-gnu
      - tar czf dist/lume-v${VERSION}-aarch64-linux-musl.tar.gz -C dist lume-aarch64-linux-musl lume-se-aarch64-linux-musl

  create-release:
    image: alpine:latest
    environment:
      CODEBERG_TOKEN:
        from_secret: codeberg_token
    commands:
      - apk add --no-cache curl
      - VERSION=${CI_COMMIT_TAG#v}
      - |
        curl -s -X POST "https://codeberg.org/api/v1/repos/${CI_REPO}/releases" \
          -H "Authorization: token ${CODEBERG_TOKEN}" \
          -H "Content-Type: application/json" \
          -d "$(printf '{"tag_name":"%s","name":"Release %s","body":"Release %s"}' "${CI_COMMIT_TAG}" "${VERSION}" "${VERSION}")"
    when:
      event: tag

  upload-assets:
    image: alpine:latest
    environment:
      CODEBERG_TOKEN:
        from_secret: codeberg_token
    commands:
      - apk add --no-cache curl
      - VERSION=${CI_COMMIT_TAG#v}
      - |
        for f in dist/lume-v${VERSION}-*.tar.gz; do
          asset_name=$(basename "$f")
          curl -s -X POST "https://codeberg.org/api/v1/repos/${CI_REPO}/releases/tag/${CI_COMMIT_TAG}/assets" \
            -H "Authorization: token ${CODEBERG_TOKEN}" \
            -F "attachment=@$f;filename=${asset_name}"
        done
    when:
      event: tag
