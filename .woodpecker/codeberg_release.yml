when:
  event: tag
  ref:
    include: [ v* ]

steps:
  build-all:
    image: rust:latest
    commands:
      # Install cross toolchain
      - apt-get update && apt-get install -y musl-tools gcc-aarch64-linux-gnu
      - cargo install cross
      # Add targets
      - rustup target add x86_64-unknown-linux-musl
      - rustup target add aarch64-unknown-linux-gnu
      - rustup target add aarch64-unknown-linux-musl
      - rustup target add x86_64-apple-darwin
      - rustup target add aarch64-apple-darwin
      - rustup target add x86_64-pc-windows-gnu
      # Build x86_64-gnu (native)
      - cargo build --release
      - cargo build --features runner --release
      - mkdir -p dist
      - cp target/release/lume dist/lume-x86_64-linux-gnu
      - cp target/release/lume-se dist/lume-se-x86_64-linux-gnu
      # Build x86_64-musl
      - cross build --release --target x86_64-unknown-linux-musl
      - cross build --features runner --release --target x86_64-unknown-linux-musl
      - cp target/x86_64-unknown-linux-musl/release/lume dist/lume-x86_64-linux-musl
      - cp target/x86_64-unknown-linux-musl/release/lume-se dist/lume-se-x86_64-linux-musl
      # Build aarch64-gnu
      - cross build --release --target aarch64-unknown-linux-gnu
      - cross build --features runner --release --target aarch64-unknown-linux-gnu
      - cp target/aarch64-unknown-linux-gnu/release/lume dist/lume-aarch64-linux-gnu
      - cp target/aarch64-unknown-linux-gnu/release/lume-se dist/lume-se-aarch64-linux-gnu
      # Build aarch64-musl
      - cross build --release --target aarch64-unknown-linux-musl
      - cross build --features runner --release --target aarch64-unknown-linux-musl
      - cp target/aarch64-unknown-linux-musl/release/lume dist/lume-aarch64-linux-musl
      - cp target/aarch64-unknown-linux-musl/release/lume-se dist/lume-se-aarch64-linux-musl
      # Build x86_64-apple-darwin
      - cross build --release --target x86_64-apple-darwin
      - cross build --features runner --release --target x86_64-apple-darwin
      - cp target/x86_64-apple-darwin/release/lume dist/lume-x86_64-apple-darwin
      - cp target/x86_64-apple-darwin/release/lume-se dist/lume-se-x86_64-apple-darwin
      # Build aarch64-apple-darwin
      - cross build --release --target aarch64-apple-darwin
      - cross build --features runner --release --target aarch64-apple-darwin
      - cp target/aarch64-apple-darwin/release/lume dist/lume-aarch64-apple-darwin
      - cp target/aarch64-apple-darwin/release/lume-se dist/lume-se-aarch64-apple-darwin
      # Build x86_64-pc-windows-gnu
      - cross build --release --target x86_64-pc-windows-gnu
      - cross build --features runner --release --target x86_64-pc-windows-gnu
      - cp target/x86_64-pc-windows-gnu/release/lume.exe dist/lume-x86_64-pc-windows-gnu.exe
      - cp target/x86_64-pc-windows-gnu/release/lume-se.exe dist/lume-se-x86_64-pc-windows-gnu.exe
      # Copy standalone install script (for curl | sh workflow)
      - cp docs/install_codeberg.sh dist/install.sh
      # Package
      - VERSION=${CI_COMMIT_TAG#v}
      - |
        package_archive() {
          local target="$1" exe_suffix="$2"
          local tmpdir="/tmp/lume-${target}"
          mkdir -p "$tmpdir"
          cp "dist/lume-${target}${exe_suffix}" "dist/lume-se-${target}${exe_suffix}" "$tmpdir/"
          cp docs/install_in_tar.sh "$tmpdir/install.sh"
          cp -r docs/data/lumesh "$tmpdir/"
          tar czf "dist/lume-v${VERSION}-${target}.tar.gz" -C "$tmpdir" .
          rm -rf "$tmpdir"
        }
        package_archive x86_64-linux-gnu ""
        package_archive x86_64-linux-musl ""
        package_archive aarch64-linux-gnu ""
        package_archive aarch64-linux-musl ""
        package_archive x86_64-apple-darwin ""
        package_archive aarch64-apple-darwin ""
        package_archive x86_64-pc-windows-gnu .exe

  create-release:
    image: alpine:latest
    environment:
      CODEBERG_TOKEN:
        from_secret: codeberg_token
    commands:
      - apk add --no-cache curl
      - VERSION=${CI_COMMIT_TAG#v}
      - |
        BODY="Release ${VERSION} of lume.\n\n"
        BODY="${BODY}If your platform is not listed in the attachments below, download from GitHub:\n"
        BODY="${BODY}https://github.com/superiums/lumesh/releases\n\n"
        BODY="${BODY}Included platforms:\n"
        BODY="${BODY}- x86_64-linux-gnu\n"
        BODY="${BODY}- x86_64-linux-musl\n"
        BODY="${BODY}- aarch64-linux-gnu\n"
        BODY="${BODY}- aarch64-linux-musl\n"
        BODY="${BODY}- x86_64-apple-darwin\n"
        BODY="${BODY}- aarch64-apple-darwin\n"
        BODY="${BODY}- x86_64-pc-windows-gnu\n"
        curl -s -X POST "https://codeberg.org/api/v1/repos/${CI_REPO}/releases" \
          -H "Authorization: token ${CODEBERG_TOKEN}" \
          -H "Content-Type: application/json" \
          -d "$(printf '{"tag_name":"%s","name":"Release %s","body":"%s"}' "${CI_COMMIT_TAG}" "${VERSION}" "${BODY}")"
    when:
      event: tag

  upload-assets:
    image: alpine:latest
    environment:
      CODEBERG_TOKEN:
        from_secret: codeberg_token
    commands:
      - apk add --no-cache curl
      - VERSION=${CI_COMMIT_TAG#v}
      - |
        for f in dist/lume-v${VERSION}-*.tar.gz dist/install.sh; do
          if [ -f "$f" ]; then
            asset_name=$(basename "$f")
            echo "Uploading $asset_name..."
            curl -s -X POST "https://codeberg.org/api/v1/repos/${CI_REPO}/releases/tag/${CI_COMMIT_TAG}/assets" \
              -H "Authorization: token ${CODEBERG_TOKEN}" \
              -F "attachment=@$f;filename=${asset_name}"
          fi
        done
    when:
      event: tag
